<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tardanzas - Consulta</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);

/* LOGO DE FONDO COMO MARCA DE AGUA */

.container {

header,
.card,
table {

header {

.search-bar input,

.btn {

border: none;

.btn-primary {

}

.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(42,82,152,0.4); }

.btn-secondary {
background: linear-gradient(135deg, #000000 0%, #333333 100%);
color: white;
}

.btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }

/* Forzar que los filtros estén habilitados */
.filter-select {
pointer-events: auto !important;
opacity: 1 !important;
cursor: pointer !important;
background: white !important;
}

input[type="radio"] {
pointer-events: auto !important;
cursor: pointer !important;
}

.table-container { overflow-x: auto; overflow-y: auto; max-height: 75vh; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

table { width: 100%; border-collapse: separate; border-spacing: 0; background: white; }

table th {
background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
color: white;
padding: 15px 12px;
text-align: left;
font-weight: 600;
font-size: 0.9em;
position: sticky;
top: 0;
z-index: 5;
}

table td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9em; }
table tr:hover { background: #f8f9fa; }

/* Filas resaltadas según tardanzas */
tr.fila-advertencia {
background: #fff3cd !important;
}

tr.fila-advertencia:hover {
background: #ffe69c !important;
}

tr.fila-peligro {
background: #f8d7da !important;
}

tr.fila-peligro:hover {
background: #f1aeb5 !important;
}

.badge-warning {
background: #fff3cd;
color: #856404;
padding: 5px 12px;
border-radius: 20px;
font-size: 0.85em;
font-weight: 600;
}

.badge-danger {
background: #f8d7da;
color: #721c24;
padding: 5px 12px;
border-radius: 20px;
font-size: 0.85em;

}

@media (max-width: 768px) {
header { flex-direction: column; text-align: center; }
.search-bar { flex-direction: column; }
.search-bar input, .search-bar select, .btn { width: 100%; min-width: 100%; }
}
</style>
</head>
<body>

<div class="container">
<header>
<div class="header-left">
<img src="./logo.png" alt="Logo" onerror="this.style.display='none'">
<div class="header-title">
<h1>Registro de Tardanzas</h1>
<p>Solo Lectura - PNSA</p>
</div>
</div>
<a href="consulta.html" class="btn-back">← Volver al Dashboard</a>
</header>

<div class="content-card">

<div class="filter-radios">
<label>📊 Filtro por Cantidad de Tardanzas en un Mes:</label>
<div class="radio-group">
<label>
<input type="radio" name="filtroTardanzas" value="todas" checked onchange="aplicarFiltro()">
<span>Todas las tardanzas</span>
</label>
<label>
<input type="radio" name="filtroTardanzas" value="3" onchange="aplicarFiltro()">
<span>⚠️ Exactamente 3 tardanzas</span>
</label>
<label>
<input type="radio" name="filtroTardanzas" value="mas3" onchange="aplicarFiltro()">
<span>🚨 Más de 3 tardanzas</span>
</label>
<label>
<input type="radio" name="filtroTardanzas" value="mas10" onchange="aplicarFiltro()">
<span>🔴 Más de 12 tardanzas acumuladas</span>
</label>
</div>
</div>

<div class="search-bar">
<div style="position: relative; flex: 1; min-width: 200px;">
<input type="text" 
id="buscarEstudiante" 
placeholder="🔍 Buscar por nombre de estudiante..."
autocomplete="off"
oninput="filtrarSugerencias(); buscarTardanzas();"
onfocus="mostrarSugerencias()"
style="width: 100%;">
<div id="sugerenciasEstudiantes" style="display:none; position:absolute; z-index:1000; background:white; border:1px solid #ccc; max-height:200px; overflow-y:auto; width:100%; box-shadow:0 2px 8px rgba(0,0,0,0.1); border-radius: 0 0 8px 8px; margin-top: -2px;"></div>
</div>
<select id="filtrarCurso" class="filter-select" onchange="buscarTardanzas()">
<option value="">Todos los cursos</option>
<option value="1roA">1roA</option>
<option value="1roB">1roB</option>
<option value="1roC">1roC</option>
<option value="2doA">2doA</option>
<option value="2doB">2doB</option>
<option value="2doC">2doC</option>
<option value="3roA">3roA</option>
<option value="3roB">3roB</option>
<option value="3roC">3roC</option>
<option value="4toA">4toA</option>
<option value="4toB">4toB</option>
<option value="4toC">4toC</option>
<option value="5toA">5toA</option>
<option value="5toB">5toB</option>
<option value="5toC">5toC</option>
<option value="6toA">6toA</option>
<option value="6toB">6toB</option>
<option value="6toC">6toC</option>
</select>
<select id="filtrarMes" class="filter-select" onchange="buscarTardanzas()">
<option value="">Todos los meses</option>
<option value="Enero">Enero</option>
<option value="Febrero">Febrero</option>
<option value="Marzo">Marzo</option>
<option value="Abril">Abril</option>
<option value="Mayo">Mayo</option>
<option value="Junio">Junio</option>
<option value="Julio">Julio</option>
<option value="Agosto">Agosto</option>
<option value="Septiembre">Septiembre</option>
<option value="Octubre">Octubre</option>
<option value="Noviembre">Noviembre</option>
<option value="Diciembre">Diciembre</option>
</select>
<button class="btn btn-secondary" onclick="recargarTardanzas()">🔄 Recargar</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Fecha</th>
<th>Estudiante</th>
<th>Curso</th>
<th>Mes</th>
<th>Total Mes</th>
</tr>
</thead>
<tbody id="bodyTardanzas">
<tr><td colspan="5" style="text-align:center;padding:40px;">📥 Cargando tardanzas...</td></tr>
</tbody>
</table>
</div>
</div>
</div>

<script src="./auth-guard.js"></script>
<script>
let datosTardanzas = [];
let tardanzasFiltradas = [];
let CONFIG = { 
urlTardanzas: 'https://script.google.com/macros/s/AKfycbxzxH-mSiQnYZAADC7JLwnfbYvKYwNyOje1Tje77PP8u9Gv_ksx_CEk0J8R1e1fHiTM/exec?hoja=Tardanzas'
};

window.addEventListener('load', function() {
const configGuardada = localStorage.getItem('censaConfig');
if (configGuardada) {
const configTemp = JSON.parse(configGuardada);
if (configTemp.urlTardanzas) {
CONFIG.urlTardanzas = configTemp.urlTardanzas;
}
console.log('✅ Configuración actualizada desde localStorage');
}
console.log('⏰ URL Tardanzas:', CONFIG.urlTardanzas);

cargarTardanzas();
});

async function cargarDatosDesdeGoogleSheets(url) {
// Filtro por año escolar recibido en la URL (?anio=)
const ANIO_CONSULTA = new URLSearchParams(location.search).get('anio') || '';
const HOJAS_CON_ANIO = ['Incidencias','Tardanzas','Reuniones','Estudiantes'];
const mHoja = url.match(/[?&]hoja=([^&]+)/);
const hojaUrl = mHoja ? decodeURIComponent(mHoja[1]) : '';
if (ANIO_CONSULTA && HOJAS_CON_ANIO.includes(hojaUrl) && !/[?&]anio=/.test(url)) {
    url += '&anio=' + encodeURIComponent(ANIO_CONSULTA);
}
try {
const response = await fetch(url);
if (!response.ok) throw new Error('Error en la respuesta');
return await response.json();
} catch (error) {
console.error('Error:', error);
return [];
}
}

async function cargarTardanzas() {
const tbody = document.getElementById('bodyTardanzas');
if (CONFIG.urlTardanzas) {
try {
const datos = await cargarDatosDesdeGoogleSheets(CONFIG.urlTardanzas);
if (datos && datos.length > 0) {
// Guardar datos originales
datosTardanzas = datos;
console.log('📊 Tardanzas originales cargadas:', datos.length);

// 🆕 AGRUPAR POR ESTUDIANTE-MES-AÑO DESDE EL INICIO
const grupos = {};
datos.forEach(t => {
const estudiante = t['Nombre Estudiante'] || '';
const mes = t['Mes'] || '';
const año = t['Año'] || '';
const clave = `${estudiante}|${mes}|${año}`;

if (!grupos[clave]) {
grupos[clave] = {
estudiante: estudiante,
curso: t['Curso'],
mes: mes,
año: año,
tardanzas: [],
totalMes: 0
};
}
grupos[clave].tardanzas.push(t);
});

// Crear array agrupado con solo una fila por estudiante-mes-año
tardanzasFiltradas = [];
Object.values(grupos).forEach(grupo => {
grupo.totalMes = grupo.tardanzas.length;

// Tomar la ÚLTIMA tardanza del mes como representante
const ultimaTardanza = grupo.tardanzas.sort((a, b) => {
const fechaA = new Date(a['Fecha']);
const fechaB = new Date(b['Fecha']);
return fechaB - fechaA;
})[0];

// Agregar el total calculado
ultimaTardanza['Total Mes'] = grupo.totalMes;
tardanzasFiltradas.push(ultimaTardanza);
});

console.log('✅ Tardanzas agrupadas:', tardanzasFiltradas.length, 'grupos');
mostrarTardanzas();
} else {
tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:60px;"><div style="font-size:4em;margin-bottom:15px;opacity:0.5;">📭</div><p>No hay tardanzas registradas</p></td></tr>';
}
} catch (error) {
tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#dc3545;">⚠️ Error al cargar datos.</td></tr>';
}
} else {
tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#dc3545;">⚠️ No hay URL de Google Sheets configurada.</td></tr>';
}
}

function mostrarTardanzas() {
const tbody = document.getElementById('bodyTardanzas');
if (tardanzasFiltradas.length === 0) {
tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:60px;">No se encontraron resultados.</td></tr>';
return;
}

tbody.innerHTML = tardanzasFiltradas.map(t => {
const totalMes = parseInt(t['Total Mes']) || 0;

// Clase para resaltar toda la fila
const claseFila = totalMes >= 4 ? 'fila-peligro' : totalMes === 3 ? 'fila-advertencia' : '';

return `<tr class="${claseFila}">
<td>${formatearFecha(t['Fecha'])}</td>
<td><strong>${t['Nombre Estudiante'] || 'N/A'}</strong></td>
<td>${t['Curso'] || 'N/A'}</td>
<td>${t['Mes'] || 'N/A'}</td>
<td><strong>${totalMes}</strong></td>
</tr>`;
}).join('') + filaTotalAcumulado();
}

// Barra azul con la sumatoria total (solo cuando se busca un estudiante específico)
function filaTotalAcumulado() {
const buscarVal = (document.getElementById('buscarEstudiante')?.value || '').trim();
if (!buscarVal || tardanzasFiltradas.length === 0) return '';
const totalAcumulado = tardanzasFiltradas.reduce((s, t) => s + (parseInt(t['Total Mes']) || 0), 0);
const nombre = tardanzasFiltradas[0]['Nombre Estudiante'] || '';
return `<tr style="background-color:#1e3a5f;color:white;">
<td colspan="4" style="text-align:right;font-weight:700;padding:10px 14px;font-size:0.95em;">📊 Total acumulado de tardanzas — ${nombre}</td>
<td style="font-weight:700;font-size:1.1em;padding:10px 14px;">${totalAcumulado}</td>
</tr>`;
}

function aplicarFiltro() {
const filtro = document.querySelector('input[name="filtroTardanzas"]:checked').value;
buscarTardanzas(filtro);
}

function buscarTardanzas(filtroRadio = null) {
const buscarEstudiante = document.getElementById('buscarEstudiante').value.toLowerCase();
const filtrarCurso = document.getElementById('filtrarCurso').value;
const filtrarMes = document.getElementById('filtrarMes').value;
const filtro = filtroRadio || document.querySelector('input[name="filtroTardanzas"]:checked').value;

console.log('🔍 Filtros aplicados:');
console.log('  - Estudiante:', buscarEstudiante || 'Todos');
console.log('  - Curso:', filtrarCurso || 'Todos');
console.log('  - Mes:', filtrarMes || 'Todos');
console.log('  - Radio:', filtro);

// Mostrar algunos ejemplos de meses en los datos
if (filtrarMes) {
const ejemplosMeses = [...new Set(datosTardanzas.map(t => t['Mes']))].slice(0, 5);
console.log('🔍 Ejemplos de meses en datos:', ejemplosMeses);
console.log('🔍 Mes buscado:', filtrarMes);
}

// 🆕 SIEMPRE AGRUPAR POR ESTUDIANTE-MES-AÑO (igual que en app.js)
console.log('📊 Agrupando por estudiante-mes-año...');

// Primero filtrar por estudiante, curso y mes
let tardanzasBase = datosTardanzas.filter(t => {
const cumpleEstudiante = !buscarEstudiante || (t['Nombre Estudiante'] && t['Nombre Estudiante'].toLowerCase().includes(buscarEstudiante));
const cumpleCurso = !filtrarCurso || t['Curso'] === filtrarCurso;
const mesTardanza = (t['Mes'] || '').toLowerCase();
const mesFiltro = filtrarMes.toLowerCase();
const cumpleMes = !filtrarMes || mesTardanza === mesFiltro;
return cumpleEstudiante && cumpleCurso && cumpleMes;
});

// Agrupar por estudiante + mes + año
const grupos = {};
tardanzasBase.forEach(t => {
const estudiante = t['Nombre Estudiante'] || '';
const mes = t['Mes'] || '';
const año = t['Año'] || '';
const clave = `${estudiante}|${mes}|${año}`;

if (!grupos[clave]) {
grupos[clave] = {
estudiante: estudiante,
curso: t['Curso'],
mes: mes,
año: año,
tardanzas: [],
totalMes: 0
};
}
grupos[clave].tardanzas.push(t);
});

// Filtro "Más de 12 tardanzas acumuladas": vista consolidada (una fila por estudiante)
if (filtro === 'mas10') {
const acumulado = {};
Object.values(grupos).forEach(g => {
if (!acumulado[g.estudiante]) acumulado[g.estudiante] = { estudiante: g.estudiante, curso: g.curso, total: 0 };
acumulado[g.estudiante].total += g.tardanzas.length;
});
const conMas12 = Object.values(acumulado).filter(e => e.total > 12).sort((a, b) => b.total - a.total);
const tbodyM = document.getElementById('bodyTardanzas');
if (conMas12.length === 0) {
tbodyM.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#999;">No hay estudiantes con más de 12 tardanzas acumuladas</td></tr>';
return;
}
tbodyM.innerHTML = conMas12.map((e, idx) => {
const esSexto = ['6toA','6toB','6toC'].includes(e.curso);
return `<tr class="fila-peligro">
<td style="color:#999;font-size:0.85em;">${idx + 1}</td>
<td><strong>🔴 ${e.estudiante}</strong>${esSexto ? ' <span style="background:#6b7280;color:white;padding:2px 8px;border-radius:10px;font-size:0.78em;font-weight:600;">No aplica</span>' : ''}</td>
<td>${e.curso || ''}</td>
<td><span style="background:#dc2626;color:white;padding:3px 10px;border-radius:12px;font-weight:700;font-size:0.95em;">${e.total} tardanzas acumuladas</span></td>
<td><span style="color:#999;font-size:0.85em;">-</span></td>
</tr>`;
}).join('');
return;
}

// Calcular totales y filtrar según el criterio
tardanzasFiltradas = [];
Object.values(grupos).forEach(grupo => {
grupo.totalMes = grupo.tardanzas.length;

// Aplicar filtro de cantidad
let cumpleFiltro = true;
if (filtro === '3') cumpleFiltro = grupo.totalMes === 3;
else if (filtro === 'mas3') cumpleFiltro = grupo.totalMes > 3;
// Si es 'todas', mostrar todos los grupos

if (cumpleFiltro) {
// Tomar la ÚLTIMA tardanza del mes como representante
const ultimaTardanza = grupo.tardanzas.sort((a, b) => {
const fechaA = new Date(a['Fecha']);
const fechaB = new Date(b['Fecha']);
return fechaB - fechaA;
})[0];

// Agregar el total calculado
ultimaTardanza['Total Mes'] = grupo.totalMes;
tardanzasFiltradas.push(ultimaTardanza);
}
});

console.log(`📊 Grupos encontrados: ${Object.keys(grupos).length}`);
console.log(`📊 Resultados filtrados: ${tardanzasFiltradas.length}`);

mostrarTardanzas();
}

function recargarTardanzas() {
document.getElementById('buscarEstudiante').value = '';
document.getElementById('filtrarCurso').value = '';
document.getElementById('filtrarMes').value = '';
document.querySelector('input[name="filtroTardanzas"][value="todas"]').checked = true;

// 🆕 AGRUPAR DATOS AL RECARGAR
const grupos = {};
datosTardanzas.forEach(t => {
const estudiante = t['Nombre Estudiante'] || '';
const mes = t['Mes'] || '';
const año = t['Año'] || '';
const clave = `${estudiante}|${mes}|${año}`;

if (!grupos[clave]) {
grupos[clave] = {
estudiante: estudiante,
curso: t['Curso'],
mes: mes,
año: año,
tardanzas: [],
totalMes: 0
};
}
grupos[clave].tardanzas.push(t);
});

tardanzasFiltradas = [];
Object.values(grupos).forEach(grupo => {
grupo.totalMes = grupo.tardanzas.length;
const ultimaTardanza = grupo.tardanzas.sort((a, b) => {
const fechaA = new Date(a['Fecha']);
const fechaB = new Date(b['Fecha']);
return fechaB - fechaA;
})[0];
ultimaTardanza['Total Mes'] = grupo.totalMes;
tardanzasFiltradas.push(ultimaTardanza);
});

mostrarTardanzas();
}

function formatearFecha(fechaStr) {
if (!fechaStr) return 'N/A';
try {
const fecha = new Date(fechaStr);
return `${String(fecha.getDate()).padStart(2, '0')}/${String(fecha.getMonth() + 1).padStart(2, '0')}/${fecha.getFullYear()}`;
} catch (error) {
return fechaStr;
}
}

// ==========================================
// AUTOCOMPLETADO DINÁMICO
// ==========================================

function filtrarSugerencias() {
const input = document.getElementById('buscarEstudiante');
const sugerencias = document.getElementById('sugerenciasEstudiantes');
const texto = input.value.toLowerCase().trim();

if (texto.length === 0) {
sugerencias.style.display = 'none';
return;
}

// Obtener estudiantes únicos de las tardanzas
const estudiantesUnicos = [...new Set(datosTardanzas
.map(tard => tard['Nombre Estudiante'])
.filter(nombre => nombre && nombre.toLowerCase().includes(texto))
)].sort();

if (estudiantesUnicos.length === 0) {
sugerencias.style.display = 'none';
return;
}

// Mostrar sugerencias
sugerencias.innerHTML = estudiantesUnicos.map(nombre => `
<div onclick="seleccionarEstudiante('${nombre.replace(/'/g, "\\'")}')" 
style="padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; transition: background 0.2s;"
onmouseover="this.style.background='#f0f0f0'"
onmouseout="this.style.background='white'">
${nombre}
</div>
`).join('');

sugerencias.style.display = 'block';
}

function mostrarSugerencias() {
const input = document.getElementById('buscarEstudiante');
if (input.value.trim().length > 0) {
filtrarSugerencias();
}
}

function seleccionarEstudiante(nombre) {
document.getElementById('buscarEstudiante').value = nombre;
document.getElementById('sugerenciasEstudiantes').style.display = 'none';
buscarTardanzas();
}

// Cerrar sugerencias al hacer clic fuera
document.addEventListener('click', function(e) {
const sugerencias = document.getElementById('sugerenciasEstudiantes');
const input = document.getElementById('buscarEstudiante');
if (e.target !== input && e.target !== sugerencias) {
sugerencias.style.display = 'none';
}
});

// ==========================================
// RE-HABILITAR FILTROS
// ==========================================

setTimeout(function() {
const filtros = document.querySelectorAll('.filter-select');
const radios = document.querySelectorAll('input[type="radio"]');

filtros.forEach(filtro => {
filtro.disabled = false;
filtro.style.opacity = '1';
filtro.style.cursor = 'pointer';
filtro.style.background = 'white';
filtro.style.pointerEvents = 'auto';
});

radios.forEach(radio => {
radio.disabled = false;
radio.style.cursor = 'pointer';
radio.style.pointerEvents = 'auto';
});

console.log('✅ Filtros re-habilitados');
}, 1000);

const intervalo = setInterval(function() {
const filtros = document.querySelectorAll('.filter-select');
const radios = document.querySelectorAll('input[type="radio"]');
let todosHabilitados = true;

filtros.forEach(filtro => {
if (filtro.disabled) {
filtro.disabled = false;
filtro.style.opacity = '1';
filtro.style.cursor = 'pointer';
filtro.style.background = 'white';
filtro.style.pointerEvents = 'auto';
todosHabilitados = false;
}
});

radios.forEach(radio => {
if (radio.disabled) {
radio.disabled = false;
radio.style.cursor = 'pointer';
radio.style.pointerEvents = 'auto';
todosHabilitados = false;
}
});

if (todosHabilitados) {
clearInterval(intervalo);
console.log('✅ Filtros permanentemente habilitados');
}
}, 500);

console.log('⏰ Módulo de tardanzas (consulta) cargado');
</script>

<script>
(function(){
  var a = new URLSearchParams(location.search).get('anio');
  var rolUGC = ''; try { rolUGC = (JSON.parse(localStorage.getItem('usuarioUGC') || '{}').rol) || ''; } catch(e) {}
  var btn = document.querySelector('.btn-back');
  if (btn) btn.setAttribute('href', (rolUGC === 'administrador' && a) ? ('admin.html?anio=' + encodeURIComponent(a)) : 'consulta.html');
  if(!a) return;
  var b=document.createElement('div');
  b.textContent='🔒 Consultando el año '+a+' — solo lectura';
  b.style.cssText='position:sticky;top:0;z-index:9999;background:#e3f2fd;color:#1976D2;font-weight:700;text-align:center;padding:8px 12px;font-size:1em;';
  document.body.insertBefore(b, document.body.firstChild);
})();
</script>
